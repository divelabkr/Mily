name: Auto Changelog

on:
  push:
    branches:
      - master

# [skip ci] 커밋이 이 워크플로우를 재트리거하지 않도록
# GitHub Actions는 [skip ci] 태그를 자동으로 인식하여 실행 건너뜀

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    # [skip ci] 포함 커밋은 건너뜀 (무한루프 방지 2중 안전장치)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Generate Changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/generate-changelog.js

      - name: Bump Version
        run: node .github/scripts/version-bump.js

      - name: Commit Changes
        run: |
          git config user.name "Mily Bot"
          git config user.email "bot@mily.app"
          git add CHANGELOG.md package.json
          git diff --staged --quiet || git commit -m "docs: auto-update changelog [skip ci]"

      - name: Push Changes
        run: git push origin master
